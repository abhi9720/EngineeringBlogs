name: Validate Blog Markdown

on:
  push:
    paths:
      - "blogs/**/*.md"
      - "blog-schema.json"
  pull_request:
    paths:
      - "blogs/**/*.md"
      - "blog-schema.json"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install gray-matter fs-extra ajv

      - name: Run blog validator
        run: node scripts/validate-blogs.js
